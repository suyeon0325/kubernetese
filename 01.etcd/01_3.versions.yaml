## v2, v3 사이에는 API 버전이 변경되어, etcd 명령어도 변경됨

--
## ./etcdctl help 출력
## 버전확인
etcdctl version

## v2
set / get / rm
etcdctl backup
etcdctl cluster-health
etcdctl mk
etcdctl mkdir
etcdctl set

## v3
## 기본값이 v2일 경우, v3사용 할때에 API v3 명시적 사용 
export ETCDCTL_API=3
put / get / del / txn
etcdctl snapshot save 
etcdctl endpoint health
etcdctl get
etcdctl put
